name: nightly

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.compare.outputs.should_build }}
    steps:
      - id: compare
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          CURRENT_SHA: ${{ github.sha }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual dispatch — building regardless of current nightly tag."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if nightly_sha=$(gh api "repos/${REPO}/commits/nightly" --jq '.sha' 2>/dev/null); then
            if [ "$nightly_sha" = "$CURRENT_SHA" ]; then
              echo "main is unchanged since last nightly (${CURRENT_SHA}) — skipping build."
              echo "should_build=false" >> "$GITHUB_OUTPUT"
            else
              echo "main=${CURRENT_SHA}, nightly=${nightly_sha} — building."
              echo "should_build=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "No existing nightly tag — building."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build static binary
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w" \
            -o "dist/vsockd-linux-${GOARCH}" ./cmd/vsockd

      - name: Checksum
        working-directory: dist
        run: sha256sum "vsockd-linux-${{ matrix.goarch }}" > "vsockd-linux-${{ matrix.goarch }}.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: vsockd-linux-${{ matrix.goarch }}
          path: dist/vsockd-linux-${{ matrix.goarch }}*
          if-no-files-found: error
          retention-days: 7

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v7
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -la dist

      - name: Publish rolling nightly release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: nightly
          name: Nightly build
          prerelease: true
          make_latest: 'false'
          body: |
            Rolling nightly build.

            - Commit: ${{ github.sha }}
            - Built: ${{ github.event.repository.updated_at }}
            - Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          files: |
            dist/vsockd-linux-amd64
            dist/vsockd-linux-amd64.sha256
            dist/vsockd-linux-arm64
            dist/vsockd-linux-arm64.sha256
