# vsockd example configuration.
#
# Inbound listeners cover HTTPS transparent SNI passthrough and plaintext
# HTTP Host-based routing. Outbound includes a shared forward-proxy port
# with per-CID egress allowlists plus a dedicated unrestricted port for a
# test enclave. Raw-TCP passthrough (non-HTTP workloads: databases, gRPC,
# arbitrary protocols) lives under its own top-level sections tcp_to_vsock
# (TCP → vsock) and vsock_to_tcp (vsock → TCP); these work identically
# whether vsockd runs on the parent host or inside the enclave. The schema
# is documented in internal/config/config.go and validated strictly at
# load time.

inbound:
  # HTTPS: terminate TCP on the host, extract SNI, pass the TLS record
  # through untouched to the enclave — the enclave owns the cert.
  - bind: 0.0.0.0
    port: 443
    mode: tls-sni
    routes:
      - hostname: api.example.com
        cid: 16
        vsock_port: 8443
      - hostname: admin.example.com
        cid: 20
        vsock_port: 8443

  # HTTP: route by Host header.
  - bind: 0.0.0.0
    port: 80
    mode: http-host
    routes:
      - hostname: api.example.com
        cid: 16
        vsock_port: 8080

outbound:
  # Shared forward-proxy vsock port used by two enclaves. Each CID carries
  # its own egress allowlist; a CID may not appear under more than one port.
  - port: 8080
    cids:
      - cid: 16
        allowed_hosts:
          - "api.stripe.com:443"
          - "*.s3.amazonaws.com:443"
      - cid: 20
        allowed_hosts:
          - "*.internal.example.com:443"

  # Dedicated port for a test enclave with no egress restrictions.
  - port: 8082
    cids:
      - cid: 42
        allowed_hosts:
          - "*"

# Raw TCP passthrough (TCP → vsock). Accepts TCP on bind:port and pipes
# bytes to a fixed vsock endpoint. Works both on the parent host (forwarding
# external TCP into an enclave) and inside the enclave (forwarding local TCP
# to the parent host's vsock). No application-layer parsing, no allowlist —
# useful for databases, gRPC, or anything non-HTTP.
tcp_to_vsock:
  - bind: 0.0.0.0
    port: 5432
    vsock_cid: 16
    vsock_port: 5432

# Raw TCP passthrough (vsock → TCP). Accepts vsock on this port and pipes
# bytes to a fixed upstream host:port. Symmetric to tcp_to_vsock: works on
# the parent host (outbound from enclave) or inside the enclave (outbound to
# the parent host). No HTTP parsing, no allowlist; any peer CID that
# connects reaches the upstream.
vsock_to_tcp:
  - port: 9000
    upstream: 10.0.0.5:5432

metrics:
  bind: 0.0.0.0:9090

# Maximum time to wait for in-flight connections to drain on SIGTERM.
shutdown_grace: 30s

# json | text | auto — "auto" picks text when stderr is a TTY.
log_format: json

# info | debug (default: info). Enables per-connection open/close debug
# logs for tcp_to_vsock and vsock_to_tcp listeners. Can also be set via
# the `-debug` flag or the VSOCKD_LOG_LEVEL env var; precedence is
# flag > env > yaml.
log_level: info
